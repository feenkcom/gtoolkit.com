<div class="col-md-4">
    <div class="card">
        <img class="card-img-top" src="{{include.image}}" alt="{{ include.caption | default: include.title | default: 'Gallery image' }}" style="width:100%">
        <div class="card-block">
            <p class="card-text">{{include.text}}</p>
        </div>
    </div>
</div>
